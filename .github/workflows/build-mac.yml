name: Build Mac Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-mac.txt

      - name: Build app and pkg
        run: |
          chmod +x build_mac.command
          ./build_mac.command

      - name: Upload Mac app zip
        uses: actions/upload-artifact@v4
        with:
          name: Teq-Shipment-Docs-Generator-mac-zip
          path: dist/Teq Shipment Docs Generator-mac.zip

      - name: Upload Mac pkg
        uses: actions/upload-artifact@v4
        with:
          name: Teq-Shipment-Docs-Generator-pkg
          path: dist/Teq Shipment Docs Generator.pkg
